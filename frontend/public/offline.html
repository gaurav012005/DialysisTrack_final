<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - DialysisTrack</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .offline-container {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #2563eb 0%, #60a5fa 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .icon::before {
            content: '📡';
            font-size: 60px;
            filter: grayscale(1);
            opacity: 0.5;
        }

        .icon::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px dashed #2563eb;
            border-radius: 50%;
            animation: rotate 10s linear infinite;
            opacity: 0.3;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        h1 {
            color: #1f2937;
            font-size: 32px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        p {
            color: #6b7280;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .status {
            display: inline-block;
            padding: 8px 16px;
            background: #fef3c7;
            color: #92400e;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .retry-btn {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }

        .retry-btn:active {
            transform: translateY(0);
        }

        .features {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #e5e7eb;
        }

        .features h3 {
            color: #374151;
            font-size: 14px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .features ul {
            list-style: none;
            color: #6b7280;
            font-size: 14px;
        }

        .features li {
            margin: 8px 0;
        }

        .features li::before {
            content: '✓ ';
            color: #10b981;
            font-weight: bold;
            margin-right: 8px;
        }

        @media (max-width: 600px) {
            .offline-container {
                padding: 40px 30px;
            }

            h1 {
                font-size: 24px;
            }

            .icon {
                width: 100px;
                height: 100px;
            }

            .icon::before {
                font-size: 50px;
            }
        }
    </style>
</head>

<body>
    <div class="offline-container">
        <div class="icon"></div>

        <div class="status">⚠️ No Internet Connection</div>

        <h1>You're Offline</h1>

        <p>
            It looks like you've lost your internet connection.
            Some features may not work until you're back online.
        </p>

        <button class="retry-btn" onclick="retryConnection()">
            🔄 Retry Connection
        </button>

        <div class="features">
            <h3>Available Offline</h3>
            <ul>
                <li>View cached pages</li>
                <li>Browse previously loaded data</li>
                <li>Access app interface</li>
            </ul>
        </div>
    </div>

    <script>
        function retryConnection() {
            window.location.reload();
        }

        // Auto-retry when connection is restored
        window.addEventListener('online', () => {
            console.log('Connection restored!');
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        });

        // Check connection status
        if (navigator.onLine) {
            retryConnection();
        }
    </script>
</body>

</html>
